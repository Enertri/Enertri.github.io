<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="portfolio.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Enertri</title>
</head>
<body>
    <div class="ui">
        <div class="logo"><a href="portfolio.html"><img src="logo.jpg" alt="Enertri Logo"></a></div>
        <div class="basket"><button class="basket" onclick="openCart()"><img src="cart.avif" alt="Shopping Cart"></button></div>
    </div>
    
    <nav>
        <button onclick="location = 'portfolio.html'">home</button>
        <button onclick="location = 'abouten.html'">products</button>
        <button onclick="location = 'contact.html'">contact</button>
    </nav>

    <div class="container" id="contact">
        <h1>Contact Us</h1>
        <div class="contact-section">
            <div class="contact-item">
                <img src="mail-removebg-preview.png" alt="Email">
                <p>enertriup@gmail.com</p>
            </div>
            <div class="contact-item">
                <img src="phone-removebg-preview.png" alt="Phone">
                <p>08 888 888 888</p>
            </div>
            <div class="contact-item">
                <img src="insta-removebg-preview.png" alt="Instagram">
                <p>@enertrup</p>
            </div>
        </div>
    </div>

    <div class="basketbar">
        <button class="close" onclick="Close()">x</button>
        <ul id="cart"></ul>
        <p>Total: $<span id="total">0</span></p>
        <a href="order.html" class="order">
            <button>order</button>
        </a>
    </div>

    <script src="enerscript.js"></script>
</body>
</html>
